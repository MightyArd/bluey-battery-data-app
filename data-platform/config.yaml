name: Bluey Data Platform
version: "0.1.0"
slug: data_platform
description: P5 ingestion, battery dispatch simulation, and 5-minute archive for Bluey.
url: https://github.com/MightyArd/bluey-battery-data-app
arch:
  - aarch64
init: false
startup: application
boot: auto
hassio_api: true
homeassistant_api: true
services:
  - mqtt:need
options:
  log_level: info
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
